<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .fundo{
            background-image: linear-gradient(45deg, white, pink);
            height: 100vh;
            color: rgb(255, 0, 111);
            font-family: Georgia; 
            text-align: center;
        }
        .Calculadora{
            position: absolute;
            background-color:rgba(0,0,0,0.1);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 15px;
            padding: 15px;
        }
        .botao{
            width: 50px;
            height: 50px;
            font-size: 25px;
            cursor: pointer;
            margin: 2px;
            background-color: rgb(234, 228, 228);
            border: none;
            color: rgb(255, 0, 111);
        }
        .botao:hover{
            background-color: white;
        }
        #Resultado{
            background-color: white;
            width: 207px;
            height: 30px;
            margin: 5px;
            font-size: 25px;
            font-family: Arial;
            color: black;
            text-align: right;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="fundo">
    <h1> Calculadora Web - HTML, CSS e JavaScript </h1>
    <div class="Calculadora">
        <h1>Calculadora</h1>
        <p id="Resultado"></p>
        <table>
            <tr>
                <td><button class="botao"onclick="clean()">C</button></td>
                <td><button class="botao"onclick="back()"><</button></td>
                <td><button class="botao"onclick="insert('/')">/</button></td>
                <td><button class="botao"onclick="insert('*')">X</button></td>
            </tr>
             <tr>
                <td><button class="botao" onclick="insert('7')">7</button></td>
                <td><button class="botao" onclick="insert('8')">8</button></td>
                <td><button class="botao" onclick="insert('9')">9</button></td>
                <td><button class="botao"onclick="insert('-')">-</button></td>
            </tr>
             <tr>
                <td><button class="botao" onclick="insert('4')">4</button></td>
                <td><button class="botao" onclick="insert('5')">5</button></td>
                <td><button class="botao" onclick="insert('6')">6</button></td>
                <td><button class="botao"onclick="insert('+')">+</button></td>
            </tr> <tr>
                <td><button class="botao" onclick="insert('1')">1</button></td>
                <td><button class="botao" onclick="insert('2')">2</button></td>
                <td><button class="botao" onclick="insert('3')">3</button></td>
                <td rowspan="2"><button class="botao" style="height: 105px;" onclick="calcular()">=</button></td> 
                <!--Rowspan e Colspan - span é expandir, row linha, col coluna, e coloca a quantidade em ""-->
            </tr>
             <tr>
                <td colspan="2"><button class="botao" style="width: 105px;"onclick="insert('0')">0</button></td>
                <td><button class="botao" onclick="insert('.')">.</button></td>
            </tr>
        </table>
    </div>
    <script>
        function insert(num)
        {
           var numero = document.getElementById('Resultado').innerHTML;
           document.getElementById('Resultado').innerHTML = numero + num;

        }
        /* Código pra tecla C */
        function clean()
        {
            document.getElementById('Resultado').innerHTML = "";
        }
        /* Código pra tecla > */
        function back()
        {
            var Resultado = document.getElementById('Resultado').innerHTML;
            document.getElementById('Resultado').innerHTML = Resultado.substring(0, Resultado.length -1);
        }
        /* Código pra tecla "=" e pra calculos */
        function calcular()
        {
            var Resultado = document.getElementById('Resultado').innerHTML;
            if(Resultado)
            {
             document.getElementById('Resultado').innerHTML = eval(Resultado);
            }
            else
            {
              document.getElementById('Resultado').innerHTML = "..."  
            }
           
           
            /*Código do Teclado*/
        }
        document.addEventListener("keydown", function(event){

    var tecla = event.key;

    if(!isNaN(tecla)){
        insert(tecla);
    }

    if(tecla === "+" || tecla === "-" || tecla === "*" || tecla === "/"){
        insert(tecla);
    }

    if(tecla === "."){
        insert(".");
    }

    if(tecla === "Enter"){
        calcular();
    }

    if(tecla === "Backspace"){
        back();
    }

    if(tecla === "Escape"){
        clean();
    }

});
    </script>
</body>
</html>
